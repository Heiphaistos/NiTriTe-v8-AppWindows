name: Build & Release Nitrite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permissions minimales (principe de moindre privilège)
permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Audit npm — bloque si vulnérabilité critique détectée
      - run: npm audit --audit-level=critical
      - run: npx vue-tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Audit npm — bloque si vulnérabilité critique détectée
      - run: npm audit --audit-level=critical
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        # NOTE: actions/checkout@v4, actions/setup-node@v4, dtolnay/rust-toolchain@stable
        # utilisent des tags flottants. Pour un build reproductible, les fixer sur des SHA complets.
        # Ex: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Cargo audit (vulnérabilités Rust)
        working-directory: src-tauri
        run: cargo install cargo-audit --quiet && cargo audit
      - run: npm run test -- --run
