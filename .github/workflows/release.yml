name: Release Nitrite

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (ex: v6.86.0)"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive `
            -Path "src-tauri/target/release/nitrite.exe" `
            -DestinationPath "Nitrite_${v}_portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Nitrite v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            Nitrite_${{ steps.version.outputs.VERSION }}_portable.zip
            src-tauri/target/release/bundle/nsis/Nitrite_${{ steps.version.outputs.VERSION }}_x64-setup.exe
